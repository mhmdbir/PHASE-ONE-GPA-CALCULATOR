  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase One GPA Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="calculator-container">
    <div class="calculator-card">
        <header class="calc-header">
            <h1>PHASE ONE GPA CALCULATOR</h1>
            <p class="subtitle">Enter your scores (0-100) to dynamically calculate your GPA and overall percentage weight.</p>
        </header>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Course / Topic</th>
                        <th>Credits</th>
                        <th>Score (0-100)</th>
                        <th>Letter Grade</th>
                    </tr>
                </thead>
                <tbody id="course-rows">
                    </tbody>
            </table>
        </div>

        <div class="dashboard-grid">
            <div class="metric-box primary-metric">
                <span class="metric-label">YOUR CALCULATED GPA</span>
                <span class="metric-value" id="gpa-output">0.000</span>
                <span class="metric-footer">Out of 4.00</span>
            </div>
            <div class="metric-box secondary-metric">
                <span class="metric-label">OVERALL SCORE</span>
                <span class="metric-value" id="score-output">0.00%</span>
                <span class="metric-footer" id="credits-output">0 of 60 Credits Active</span>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
